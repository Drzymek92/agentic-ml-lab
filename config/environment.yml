# agentic_ml_lab — conda environment for portable reconstruction on the new PC.
# Preferred path on a fresh machine (handles the native ML toolchain + CUDA cleanly):
#     conda env create -f config/environment.yml
#     conda activate agentic_ml_lab
# For the GPU build of torch, follow SETUP.md §GPU AFTER creating the env (don't pin CUDA here —
# it must match the new PC's driver/CUDA version, unknown at authoring time).
name: agentic_ml_lab
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pandas=2.2.3
  - numpy=1.26.4
  - scipy=1.13.1
  - pyarrow=16.1.0
  - scikit-learn=1.5.1
  - matplotlib=3.9.1
  - seaborn=0.13.2
  - jupyterlab=4.2.4
  - pyyaml=6.0.1
  - python-dotenv=1.0.1
  # pip-only / fast-moving — installed via pip to match requirements.txt exactly
  - pip:
      - xgboost==2.1.1
      - lightgbm==4.5.0
      - catboost==1.2.5
      - optuna==3.6.1
      - torch==2.7.1          # CPU baseline; replace with the cu128 CUDA build per SETUP.md §GPU (Blackwell/sm_120)
      - kaggle==1.6.17
      - langchain-openai==0.1.20
